services:
  api:
    container_name: cherryagent-api
    build:
      context: .
      dockerfile: Dockerfile.prod
    env_file: .env
    restart: unless-stopped
    networks:
      - infra-net
    user: "1001:1001"  # match VPS host sam (UID 1001:GID 1001)
    volumes:
      - cherryagent-data:/home/node/.cherryagent
      - cherryagent-media:/opt/cherry-agent/media
      - ./cookies.txt:/app/cookies.txt:ro
      - /home/sam/apps:/home/sam/apps

networks:
  infra-net:
    external: true
    name: infra-net

volumes:
  cherryagent-data:
    name: cherryagent-data
  cherryagent-media:
    name: cherryagent-media
